<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <title>Parallel Chords on Opposite Sides of Centre</title>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
      .step { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .line-circle { stroke: #3498db; stroke-width: 2.5; fill: none; }
      .line-chord { stroke: #2c3e50; stroke-width: 2.5; }
      .line-perp { stroke: #e74c3c; stroke-width: 2; }
      .line-radius { stroke: #27ae60; stroke-width: 1.5; stroke-dasharray: 4,3; }
      .point-label { fill: #e74c3c; font-weight: bold; font-family: 'Times New Roman', serif; font-size: 15px; }
      .dim-label { fill: #8e44ad; font-size: 12px; font-style: italic; }
    </style>
  </defs>

  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" class="title" font-weight="bold">Two Parallel Chords on Opposite Sides of Centre (R = 5 cm)</text>

  <!-- Circle -->
  <circle cx="250" cy="240" r="180" class="line-circle"/>

  <!-- Centre O -->
  <circle cx="250" cy="240" r="3.5" fill="#e74c3c"/>
  <text x="235" y="228" class="point-label">O</text>

  <!-- Chord AB (length 6 cm scaled) -->
  <line x1="110" y1="100" x2="390" y2="100" class="line-chord"/>
  <text x="95" y="93" class="point-label">A</text>
  <text x="398" y="93" class="point-label">B</text>

  <!-- Chord CD (length 8 cm scaled) -->
  <line x1="70" y1="380" x2="430" y2="380" class="line-chord"/>
  <text x="55" y="375" class="point-label">C</text>
  <text x="438" y="375" class="point-label">D</text>

  <!-- Perpendicular from O to AB (d₁) -->
  <line x1="250" y1="240" x2="250" y2="100" class="line-perp"/>
  <text x="255" y="165" class="point-label">M</text>
  <rect x="242" y="228" width="8" height="8" fill="none" stroke="#e74c3c" stroke-width="1.2"/>

  <!-- Perpendicular from O to CD (d₂) -->
  <line x1="250" y1="240" x2="250" y2="380" class="line-perp"/>
  <text x="255" y="365" class="point-label">N</text>
  <rect x="242" y="232" width="8" height="8" fill="none" stroke="#e74c3c" stroke-width="1.2" visibility="hidden"/>

  <!-- Right angle at N -->
  <rect x="242" y="362" width="8" height="8" fill="none" stroke="#e74c3c" stroke-width="1.2"/>

  <!-- Distance labels -->
  <!-- d₁ = 4 cm -->
  <text x="180" y="178" class="dim-label" fill="#e74c3c">d₁ = 4 cm</text>
  <!-- d₂ = 3 cm -->
  <text x="180" y="320" class="dim-label" fill="#e74c3c">d₂ = 3 cm</text>

  <!-- Half-chord lengths -->
  <text x="140" y="130" class="dim-label">AM = 3 cm</text>
  <text x="290" y="130" class="dim-label">BM = 3 cm</text>
  <text x="120" y="395" class="dim-label">CN = 4 cm</text>
  <text x="300" y="395" class="dim-label">DN = 4 cm</text>

  <!-- Radii OA and OC -->
  <line x1="250" y1="240" x2="110" y2="100" class="line-radius"/>
  <line x1="250" y1="240" x2="70" y2="380" class="line-radius"/>
  <text x="148" y="148" fill="#27ae60" font-size="12" font-style="italic">R = 5 cm</text>
  <text x="140" y="330" fill="#27ae60" font-size="12" font-style="italic">R = 5 cm</text>

  <!-- Total distance between chords -->
  <line x1="330" y1="100" x2="330" y2="380" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="340" y="245" class="dim-label" fill="#8e44ad">Distance = d₁ + d₂ = 7 cm</text>

  <!-- Steps -->
  <text x="20" y="425" class="step">Given: R = 5 cm, AB = 6 cm, CD = 8 cm, AB ∥ CD, on opposite sides of O</text>
  <text x="20" y="440" class="step">Find: d₁ = √(5² − 3²) = 4 cm, d₂ = √(5² − 4²) = 3 cm, Distance = d₁ + d₂ = 7 cm</text>
</svg>
