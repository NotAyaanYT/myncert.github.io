<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <title>Two Parallel Chords on Opposite Sides of Centre</title>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
      .step { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .line-circle { stroke: #3498db; stroke-width: 2.5; fill: none; }
      .line-chord { stroke: #2c3e50; stroke-width: 2.5; }
      .line-perp { stroke: #e74c3c; stroke-width: 2; }
      .line-radius { stroke: #27ae60; stroke-width: 1.5; stroke-dasharray: 4,3; }
      .point-label { fill: #e74c3c; font-weight: bold; font-family: 'Times New Roman', serif; font-size: 15px; }
      .dim-label { fill: #8e44ad; font-size: 12px; font-style: italic; }
    </style>
  </defs>

  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" class="title" font-weight="bold">Two Parallel Chords on Opposite Sides of Centre (R = 5 cm)</text>

  <!-- Circle with centre O(250, 240) radius 180 (5cm at 36px/cm) -->
  <circle cx="250" cy="240" r="180" class="line-circle"/>

  <!-- Centre O -->
  <circle cx="250" cy="240" r="3.5" fill="#e74c3c"/>
  <text x="235" y="228" class="point-label">O</text>

  <!-- Chord AB (upper): y=96, half-length=108 (3cm) -->
  <!-- d₁ = 4cm = 144px from centre -->
  <!-- A(250-108, 240-144) = (142, 96), B(250+108, 240-144) = (358, 96) -->
  <line x1="142" y1="96" x2="358" y2="96" class="line-chord"/>
  <text x="128" y="89" class="point-label">A</text>
  <text x="362" y="89" class="point-label">B</text>

  <!-- Chord CD (lower): y=348, half-length=144 (4cm) -->
  <!-- d₂ = 3cm = 108px from centre -->
  <!-- C(250-144, 240+108) = (106, 348), D(250+144, 240+108) = (394, 348) -->
  <line x1="106" y1="348" x2="394" y2="348" class="line-chord"/>
  <text x="90" y="343" class="point-label">C</text>
  <text x="398" y="343" class="point-label">D</text>

  <!-- Perpendicular OM (vertical to AB) -->
  <line x1="250" y1="240" x2="250" y2="96" class="line-perp"/>
  <text x="255" y="160" class="point-label">M</text>

  <!-- Perpendicular ON (vertical to CD) -->
  <line x1="250" y1="240" x2="250" y2="348" class="line-perp"/>
  <text x="255" y="335" class="point-label">N</text>

  <!-- Right angle at M -->
  <polyline points="242,96 242,108 250,108" fill="none" stroke="#e74c3c" stroke-width="1.5"/>

  <!-- Right angle at N -->
  <polyline points="242,348 242,336 250,336" fill="none" stroke="#e74c3c" stroke-width="1.5"/>

  <!-- Radii OA, OB, OC, OD (dashed) -->
  <line x1="250" y1="240" x2="142" y2="96" class="line-radius"/>
  <line x1="250" y1="240" x2="358" y2="96" class="line-radius"/>
  <line x1="250" y1="240" x2="106" y2="348" class="line-radius"/>
  <line x1="250" y1="240" x2="394" y2="348" class="line-radius"/>

  <!-- Distance labels -->
  <text x="225" y="120" fill="#e67e22" font-size="12" font-style="italic">d₁</text>
  <text x="225" y="310" fill="#e67e22" font-size="12" font-style="italic">d₂</text>

  <!-- Half-chord labels -->
  <text x="195" y="90" fill="#8e44ad" font-size="11" font-style="italic">AM</text>
  <text x="310" y="90" fill="#8e44ad" font-size="11" font-style="italic">MB</text>
  <text x="180" y="363" fill="#8e44ad" font-size="11" font-style="italic">CN</text>
  <text x="325" y="363" fill="#8e44ad" font-size="11" font-style="italic">ND</text>

  <!-- Steps -->
  <text x="20" y="425" class="step">Two chords AB and CD are parallel. OM ⟂ AB, ON ⟂ CD. d₁ = distance from O to AB, d₂ = distance from O to CD.</text>
</svg>
