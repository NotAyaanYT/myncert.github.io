<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 500" width="550" height="500">
  <title>City Grid Model - Coordinate System</title>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .step { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .street-h { stroke: #3498db; stroke-width: 1.5; }
      .street-v { stroke: #e67e22; stroke-width: 1.5; }
      .intersection { fill: #e74c3c; }
      .label-h { fill: #3498db; font-family: Arial, sans-serif; font-size: 10px; }
      .label-v { fill: #e67e22; font-family: Arial, sans-serif; font-size: 10px; }
      .axis-label { fill: #2c3e50; font-family: 'Times New Roman', serif; font-size: 13px; font-weight: bold; }
    </style>
  </defs>

  <!-- Title -->
  <text x="275" y="25" text-anchor="middle" class="title" font-weight="bold">City Grid: N-S and E-W Streets</text>
  <text x="275" y="42" text-anchor="middle" class="step">10 N-S streets × 10 E-W streets | Scale: 1 cm = 200 m</text>

  <!-- E-W streets (horizontal, N-S direction) -->
  <g>
    <line x1="60" y1="70" x2="510" y2="70" class="street-h"/>
    <line x1="60" y1="110" x2="510" y2="110" class="street-h"/>
    <line x1="60" y1="150" x2="510" y2="150" class="street-h"/>
    <line x1="60" y1="190" x2="510" y2="190" class="street-h"/>
    <line x1="60" y1="230" x2="510" y2="230" class="street-h"/>
    <line x1="60" y1="270" x2="510" y2="270" class="street-h"/>
    <line x1="60" y1="310" x2="510" y2="310" class="street-h"/>
    <line x1="60" y1="350" x2="510" y2="350" class="street-h"/>
    <line x1="60" y1="390" x2="510" y2="390" class="street-h"/>
    <line x1="60" y1="430" x2="510" y2="430" class="street-h"/>
  </g>

  <!-- N-S streets (vertical, E-W direction) -->
  <g>
    <line x1="60" y1="70" x2="60" y2="430" class="street-v"/>
    <line x1="110" y1="70" x2="110" y2="430" class="street-v"/>
    <line x1="160" y1="70" x2="160" y2="430" class="street-v"/>
    <line x1="210" y1="70" x2="210" y2="430" class="street-v"/>
    <line x1="260" y1="70" x2="260" y2="430" class="street-v"/>
    <line x1="310" y1="70" x2="310" y2="430" class="street-v"/>
    <line x1="360" y1="70" x2="360" y2="430" class="street-v"/>
    <line x1="410" y1="70" x2="410" y2="430" class="street-v"/>
    <line x1="460" y1="70" x2="460" y2="430" class="street-v"/>
    <line x1="510" y1="70" x2="510" y2="430" class="street-v"/>
  </g>

  <!-- Highlight intersection (4,3) → 4th N-S × 3rd E-W -->
  <circle cx="210" cy="150" r="6" fill="#e74c3c" opacity="0.7"/>
  <text x="210" y="142" text-anchor="middle" fill="#e74c3c" font-weight="bold" font-size="11">(4,3)</text>

  <!-- Highlight intersection (3,4) → 3rd N-S × 4th E-W -->
  <circle cx="160" cy="190" r="6" fill="#27ae60" opacity="0.7"/>
  <text x="160" y="182" text-anchor="middle" fill="#27ae60" font-weight="bold" font-size="11">(3,4)</text>

  <!-- Axis labels -->
  <text x="560" y="255" class="axis-label">N-S Street No.</text>
  <text x="15" y="255" writing-mode="tb" class="axis-label">E-W Street No.</text>

  <!-- N-S numbering (bottom) -->
  <text x="60" y="450" class="label-v">1</text>
  <text x="110" y="450" class="label-v">2</text>
  <text x="160" y="450" class="label-v">3</text>
  <text x="210" y="450" class="label-v">4</text>
  <text x="260" y="450" class="label-v">5</text>
  <text x="310" y="450" class="label-v">6</text>
  <text x="360" y="450" class="label-v">7</text>
  <text x="410" y="450" class="label-v">8</text>
  <text x="460" y="450" class="label-v">9</text>
  <text x="504" y="450" class="label-v">10</text>

  <!-- E-W numbering (left) -->
  <text x="45" y="74" class="label-h">1</text>
  <text x="45" y="114" class="label-h">2</text>
  <text x="45" y="154" class="label-h">3</text>
  <text x="45" y="194" class="label-h">4</text>
  <text x="45" y="234" class="label-h">5</text>
  <text x="45" y="274" class="label-h">6</text>
  <text x="45" y="314" class="label-h">7</text>
  <text x="45" y="354" class="label-h">8</text>
  <text x="45" y="394" class="label-h">9</text>
  <text x="39" y="434" class="label-h">10</text>

  <!-- Legend -->
  <rect x="70" y="460" width="12" height="12" fill="#e74c3c" opacity="0.7"/>
  <text x="86" y="471" class="step" font-size="10">Intersection (4,3) — 4th N-S × 3rd E-W</text>
  <rect x="70" y="477" width="12" height="12" fill="#27ae60" opacity="0.7"/>
  <text x="86" y="488" class="step" font-size="10">Intersection (3,4) — 3rd N-S × 4th E-W</text>
</svg>
