<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <title>Construction of Circumcircle of an Acute Triangle</title>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
      .step { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .line-triangle { stroke: #2c3e50; stroke-width: 2.5; }
      .line-circle { stroke: #3498db; stroke-width: 2.5; fill: none; }
      .line-bisector { stroke: #e67e22; stroke-width: 1.5; stroke-dasharray: 5,4; }
      .point-label { fill: #e74c3c; font-weight: bold; font-family: 'Times New Roman', serif; font-size: 16px; }
      .label { fill: #e74c3c; font-weight: bold; font-size: 15px; }
    </style>
  </defs>

  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" class="title" font-weight="bold">Step-by-Step: Circumcircle of an Acute Triangle</text>

  <!-- Triangle ABC: A(120,370), B(380,370), C(250,90) -->
  <!-- Triangle fill -->
  <polygon points="120,370 380,370 250,90" fill="rgba(52,152,219,0.08)" stroke="none"/>

  <!-- Triangle sides -->
  <line x1="120" y1="370" x2="380" y2="370" class="line-triangle"/>
  <line x1="380" y1="370" x2="250" y2="90" class="line-triangle"/>
  <line x1="250" y1="90" x2="120" y2="370" class="line-triangle"/>

  <!-- Perpendicular bisector of AB (vertical at x=250, from y=200 to y=390) -->
  <!-- AB is horizontal, so its perp bisector is vertical -->
  <line x1="250" y1="200" x2="250" y2="390" class="line-bisector"/>

  <!-- Perpendicular bisector of BC through M_BC(315,230), slope = -13/28 -->
  <!-- From (380, 200) to (78, 340) -->
  <line x1="380" y1="200" x2="78" y2="340" class="line-bisector"/>

  <!-- Perpendicular bisector of AC through M_AC(185,230), slope = 13/28 -->
  <!-- From (120, 200) to (422, 340) -->
  <line x1="120" y1="200" x2="422" y2="340" class="line-bisector"/>

  <!-- Circumcentre O(250, 260.18) -->
  <circle cx="250" cy="260.18" r="4" fill="#e74c3c"/>
  <text x="258" y="255" class="point-label">O</text>

  <!-- Circumcircle: centre O(250, 260.18), radius 170.2 -->
  <circle cx="250" cy="260.18" r="170.2" class="line-circle"/>

  <!-- Midpoint marks on sides -->
  <!-- AB midpoint (250, 370) -->
  <line x1="245" y1="370" x2="245" y2="377" stroke="#e67e22" stroke-width="2"/>
  <line x1="255" y1="370" x2="255" y2="377" stroke="#e67e22" stroke-width="2"/>
  <!-- BC midpoint (315, 230) -->
  <line x1="315" y1="225" x2="322" y2="228" stroke="#e67e22" stroke-width="2"/>
  <line x1="312" y1="233" x2="319" y2="236" stroke="#e67e22" stroke-width="2"/>
  <!-- AC midpoint (185, 230) -->
  <line x1="185" y1="225" x2="178" y2="228" stroke="#e67e22" stroke-width="2"/>
  <line x1="188" y1="233" x2="181" y2="236" stroke="#e67e22" stroke-width="2"/>

  <!-- Vertex labels -->
  <text x="105" y="385" class="label">A</text>
  <text x="388" y="385" class="label">B</text>
  <text x="240" y="80" class="label">C</text>

  <!-- Steps -->
  <text x="20" y="425" class="step">Step 1: Draw triangle ABC.</text>
  <text x="20" y="440" class="step">Step 2: Draw perpendicular bisectors of any two sides. Their intersection O is the circumcentre.</text>
  <text x="20" y="410" class="step">Step 3: Draw circle with centre O through any vertex.</text>
</svg>
