<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <title>Construction of Circumcircle of an Acute Triangle</title>
  <defs>
    <style>
      .label { font-family: 'Times New Roman', serif; font-size: 14px; font-style: italic; }
      .title { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
      .step { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .dot { fill: #e74c3c; }
      .line-construction { stroke: #888; stroke-width: 1; stroke-dasharray: 5,3; }
      .line-side { stroke: #2c3e50; stroke-width: 2; }
      .line-circle { stroke: #3498db; stroke-width: 2; fill: none; }
      .line-bisector { stroke: #e67e22; stroke-width: 1.5; stroke-dasharray: 4,4; }
      .point-label { fill: #e74c3c; font-weight: bold; }
    </style>
  </defs>

  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" class="title" font-weight="bold">Step-by-Step: Circumcircle of an Acute Triangle</text>

  <!-- Triangle ABC -->
  <polygon points="120,350 380,350 250,120" fill="rgba(52,152,219,0.08)" stroke="#2c3e50" stroke-width="2.5"/>

  <!-- Sides -->
  <line x1="120" y1="350" x2="380" y2="350" class="line-side"/>
  <line x1="380" y1="350" x2="250" y2="120" class="line-side"/>
  <line x1="250" y1="120" x2="120" y2="350" class="line-side"/>

  <!-- Perpendicular bisector of AB (left side) -->
  <line x1="170" y1="300" x2="300" y2="170" class="line-bisector"/>
  <!-- Perpendicular bisector of BC (bottom side) -->
  <line x1="250" y1="200" x2="250" y2="380" class="line-bisector"/>
  <!-- Perpendicular bisector of AC (right side) -->
  <line x1="315" y1="235" x2="220" y2="370" class="line-bisector"/>

  <!-- Circumcentre O -->
  <circle cx="250" cy="240" r="4" fill="#e74c3c"/>
  <text x="258" y="235" class="point-label" font-size="15">O</text>

  <!-- Circumcircle -->
  <circle cx="250" cy="240" r="130" class="line-circle"/>

  <!-- Right angle marks on bisectors -->
  <rect x="240" y="295" width="10" height="10" fill="none" stroke="#e67e22" stroke-width="1"/>
  <rect x="270" y="185" width="10" height="10" fill="none" stroke="#e67e22" stroke-width="1" transform="rotate(-45,275,190)"/>

  <!-- Vertex labels -->
  <text x="105" y="365" class="point-label" font-size="16">A</text>
  <text x="388" y="365" class="point-label" font-size="16">B</text>
  <text x="240" y="110" class="point-label" font-size="16">C</text>

  <!-- Midpoint labels -->
  <text x="155" y="343" class="label" fill="#e67e22" font-size="11">M₁</text>
  <text x="300" y="368" class="label" fill="#e67e22" font-size="11">M₂</text>
  <text x="310" y="225" class="label" fill="#e67e22" font-size="11">M₃</text>

  <!-- Radius indicator -->
  <line x1="250" y1="240" x2="250" y2="110" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="225" y="165" fill="#3498db" font-size="11" font-style="italic">R</text>

  <!-- Step labels -->
  <text x="20" y="420" class="step">Step 1: Draw triangle ABC</text>
  <text x="20" y="435" class="step">Step 2: Draw perpendicular bisectors of any two sides</text>
  <text x="20" y="450" class="step">Step 3: Intersection O = circumcentre; OA = OB = OC = R (radius)</text>
</svg>
