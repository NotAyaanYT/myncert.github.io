    <text x="0" y="0" font-weight="bold" font-size="12" fill="#333">Legend</text>
    <rect x="0" y="10" width="14" height="10" class="bedroom" opacity="0.6"/>
    <text x="18" y="19" class="legend-text">Bedroom (Room OABC)</text>
    <rect x="0" y="25" width="14" height="10" class="bathroom" opacity="0.6"/>
