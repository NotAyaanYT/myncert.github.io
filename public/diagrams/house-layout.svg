    <rect x="0" y="40" width="14" height="10" class="dining" opacity="0.6"/>
    <text x="18" y="49" class="legend-text">Dining Room (PASQ)</text>
    <rect x="0" y="55" width="14" height="10" class="shower" opacity="0.6"/>
    <text x="18" y="64" class="legend-text">Showering Area (SHWR)</text>
    <rect x="0" y="70" width="14" height="10" class="wardrobe" opacity="0.6"/>
    <text x="18" y="79" class="legend-text">Wardrobe</text>
    <rect x="0" y="85" width="14" height="10" class="table" opacity="0.6"/>
    <text x="18" y="94" class="legend-text">Study Table</text>
    <rect x="0" y="100" width="14" height="10" class="washbasin" opacity="0.6"/>
