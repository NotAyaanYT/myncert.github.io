<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 420" width="550" height="420">
  <title>Cyclic Quadrilateral — Opposite Angles Sum to 180°</title>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .circle { stroke: #2980b9; stroke-width: 2.5; fill: none; }
      .chord { stroke: #8e44ad; stroke-width: 2.5; }
      .diagonal { stroke: #95a5a6; stroke-width: 1.2; stroke-dasharray: 6,4; }
      .radius { stroke: #27ae60; stroke-width: 1; stroke-dasharray: 4,3; }
      .point { fill: #2c3e50; }
      .label { font-family: 'Times New Roman', serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .angle-arc { fill: none; stroke: #e74c3c; stroke-width: 1.5; }
      .angle-fill { fill: #e74c3c; opacity: 0.12; }
      .angle-label { font-family: 'Times New Roman', serif; font-size: 13px; font-style: italic; fill: #e74c3c; }
      .angle-label-blue { font-family: 'Times New Roman', serif; font-size: 13px; font-style: italic; fill: #2980b9; }
      .note { font-family: Arial, sans-serif; font-size: 10px; fill: #888; }
    </style>
  </defs>

  <!-- Title -->
  <text x="275" y="25" text-anchor="middle" class="title" font-weight="bold">Cyclic Quadrilateral ABCD</text>
  <text x="275" y="42" text-anchor="middle" class="subtitle">Theorem 11: ∠A + ∠C = 180° and ∠B + ∠D = 180°</text>

  <!-- Circle with centre O at (280, 200), radius 160 -->
  <circle cx="280" cy="200" r="160" class="circle"/>

  <!-- Points on circle (calculated using trigonometry from centre O(280,200), R=160):
       A: angle 15°  (upper right) → (280+160·cos15°, 200−160·sin15°) ≈ (434.5, 158.6)
       B: angle 90°  (top)         → (280, 200−160)                    = (280, 40)
       C: angle 180° (left)        → (280−160, 200)                   = (120, 200)
       D: angle 280° (lower right) → (280+160·cos80°, 200+160·sin80°) ≈ (307.8, 357.6)
  -->

  <!-- Quadrilateral sides -->
  <polygon points="434.5,158.6 280,40 120,200 307.8,357.6" class="chord" fill="#8e44ad" opacity="0.06"/>

  <!-- Vertex labels -->
  <text x="440" y="155" class="label">A</text>
  <text x="270" y="35" class="label">B</text>
  <text x="108" y="205" class="label">C</text>
  <text x="312" y="365" class="label">D</text>

  <!-- Centre O -->
  <circle cx="280" cy="200" r="2.5" class="point"/>
  <text x="265" y="205" class="label">O</text>

  <!-- Radii OA, OB, OC, OD -->
  <line x1="280" y1="200" x2="434.5" y2="158.6" class="radius"/>
  <line x1="280" y1="200" x2="280" y2="40" class="radius"/>
  <line x1="280" y1="200" x2="120" y2="200" class="radius"/>
  <line x1="280" y1="200" x2="307.8" y2="357.6" class="radius"/>

  <!-- Diagonal AC (optional, for reference) -->
  <line x1="434.5" y1="158.6" x2="120" y2="200" class="diagonal"/>
  <!-- Diagonal BD -->
  <line x1="280" y1="40" x2="307.8" y2="357.6" class="diagonal"/>

  <!-- Angle arcs (radius 35, aligned with interior angle directions) -->

  <!-- ∠A at A(434.5, 158.6): between AB direction (217.5°) and AD direction (122.5°)
       Arc from AD(122.5°) to AB(217.5°) counterclockwise, 95° span -->
  <path d="M 415.7,188.1 A 35,35 0 0,0 406.8,137.3" fill="none" class="angle-arc"/>
  <text x="413" y="175" class="angle-label">∠A</text>

  <!-- ∠B at B(280, 40): between BA direction (37.5°) and BC direction (135°)
       Arc from BA(37.5°) to BC(135°) counterclockwise, 97.5° span -->
  <path d="M 307.8,61.3 A 35,35 0 0,0 255.3,64.7" fill="none" stroke="#2980b9" stroke-width="1.5"/>
  <text x="290" y="58" class="angle-label-blue">∠B</text>

  <!-- ∠C at C(120, 200): between CB direction (315°) and CD direction (40°)
       Arc from CB(315°) to CD(40°) counterclockwise (wrapping 0°), 85° span -->
  <path d="M 144.7,175.3 A 35,35 0 0,0 146.8,222.5" fill="none" class="angle-arc"/>
  <text x="128" y="205" class="angle-label">∠C</text>

  <!-- ∠D at D(307.8, 357.6): between DC direction (220°) and DA direction (302.5°)
       Arc from DC(220°) to DA(302.5°) counterclockwise, 82.5° span -->
  <path d="M 281.0,335.1 A 35,35 0 0,0 326.6,328.1" fill="none" stroke="#2980b9" stroke-width="1.5"/>
  <text x="320" y="338" class="angle-label-blue">∠D</text>

  <!-- Theorem statement -->
  <text x="275" y="410" text-anchor="middle" class="note">In a cyclic quadrilateral, opposite angles sum to 180°: ∠A + ∠C = 180°, ∠B + ∠D = 180°</text>
  <text x="275" y="425" text-anchor="middle" class="note">Proof uses Theorem 9: Central angle = 2 × Inscribed angle for arcs BCD and DAB</text>
</svg>
