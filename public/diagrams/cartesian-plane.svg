<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <title>Cartesian Plane with Points</title>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .step { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .axis { stroke: #2c3e50; stroke-width: 2.5; }
      .grid { stroke: #ddd; stroke-width: 0.8; }
      .tick { stroke: #2c3e50; stroke-width: 1.5; }
      .point { fill: #e74c3c; }
      .point-label { fill: #e74c3c; font-weight: bold; font-family: 'Times New Roman', serif; font-size: 14px; }
      .axis-label { fill: #2c3e50; font-family: 'Times New Roman', serif; font-size: 14px; font-style: italic; }
      .quad-label { fill: #3498db; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
    </style>
  </defs>

  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" class="title" font-weight="bold">Cartesian Plane: Four Quadrants</text>

  <!-- Origin at (250, 250), each unit = 40px -->
  <!-- Grid: x from -5 to 5 (x: 50 to 450), y from -5 to 5 (y: 50 to 450) -->
  <g class="grid">
    <!-- Vertical grid lines -->
    <line x1="50" y1="50" x2="50" y2="450"/>
    <line x1="90" y1="50" x2="90" y2="450"/>
    <line x1="130" y1="50" x2="130" y2="450"/>
    <line x1="170" y1="50" x2="170" y2="450"/>
    <line x1="210" y1="50" x2="210" y2="450"/>
    <line x1="290" y1="50" x2="290" y2="450"/>
    <line x1="330" y1="50" x2="330" y2="450"/>
    <line x1="370" y1="50" x2="370" y2="450"/>
    <line x1="410" y1="50" x2="410" y2="450"/>
    <line x1="450" y1="50" x2="450" y2="450"/>
    <!-- Horizontal grid lines -->
    <line x1="50" y1="50" x2="450" y2="50"/>
    <line x1="50" y1="90" x2="450" y2="90"/>
    <line x1="50" y1="130" x2="450" y2="130"/>
    <line x1="50" y1="170" x2="450" y2="170"/>
    <line x1="50" y1="210" x2="450" y2="210"/>
    <line x1="50" y1="290" x2="450" y2="290"/>
    <line x1="50" y1="330" x2="450" y2="330"/>
    <line x1="50" y1="370" x2="450" y2="370"/>
    <line x1="50" y1="410" x2="450" y2="410"/>
    <line x1="50" y1="450" x2="450" y2="450"/>
  </g>

  <!-- X-axis (horizontal) -->
  <line x1="50" y1="250" x2="460" y2="250" class="axis"/>
  <!-- Y-axis (vertical) -->
  <line x1="250" y1="50" x2="250" y2="460" class="axis"/>

  <!-- Arrow heads -->
  <polygon points="460,250 448,244 448,256" fill="#2c3e50"/>
  <polygon points="250,50 244,62 256,62" fill="#2c3e50"/>

  <!-- Axis labels -->
  <text x="468" y="255" class="axis-label">x</text>
  <text x="253" y="45" class="axis-label">y</text>
  <text x="238" y="255" class="axis-label">O</text>

  <!-- Tick marks and numbers on X-axis -->
  <!-- x = 250 + n*40 -->
  <line x1="90" y1="245" x2="90" y2="255" class="tick"/><text x="82" y="270" font-size="11" fill="#555">−4</text>
  <line x1="130" y1="245" x2="130" y2="255" class="tick"/><text x="123" y="270" font-size="11" fill="#555">−3</text>
  <line x1="170" y1="245" x2="170" y2="255" class="tick"/><text x="163" y="270" font-size="11" fill="#555">−2</text>
  <line x1="210" y1="245" x2="210" y2="255" class="tick"/><text x="203" y="270" font-size="11" fill="#555">−1</text>
  <line x1="290" y1="245" x2="290" y2="255" class="tick"/><text x="287" y="270" font-size="11" fill="#555">1</text>
  <line x1="330" y1="245" x2="330" y2="255" class="tick"/><text x="327" y="270" font-size="11" fill="#555">2</text>
  <line x1="370" y1="245" x2="370" y2="255" class="tick"/><text x="367" y="270" font-size="11" fill="#555">3</text>
  <line x1="410" y1="245" x2="410" y2="255" class="tick"/><text x="407" y="270" font-size="11" fill="#555">4</text>

  <!-- Tick marks and numbers on Y-axis -->
  <!-- y = 250 - n*40 -->
  <line x1="245" y1="90" x2="255" y2="90" class="tick"/><text x="230" y="94" font-size="11" fill="#555">4</text>
  <line x1="245" y1="130" x2="255" y2="130" class="tick"/><text x="230" y="134" font-size="11" fill="#555">3</text>
  <line x1="245" y1="170" x2="255" y2="170" class="tick"/><text x="230" y="174" font-size="11" fill="#555">2</text>
  <line x1="245" y1="210" x2="255" y2="210" class="tick"/><text x="230" y="214" font-size="11" fill="#555">1</text>
  <line x1="245" y1="290" x2="255" y2="290" class="tick"/><text x="237" y="293" font-size="11" fill="#555">−1</text>
  <line x1="245" y1="330" x2="255" y2="330" class="tick"/><text x="237" y="333" font-size="11" fill="#555">−2</text>
  <line x1="245" y1="370" x2="255" y2="370" class="tick"/><text x="237" y="373" font-size="11" fill="#555">−3</text>
  <line x1="245" y1="410" x2="255" y2="410" class="tick"/><text x="237" y="413" font-size="11" fill="#555">−4</text>

  <!-- Quadrant labels -->
  <text x="380" y="140" class="quad-label">Quadrant I</text>
  <text x="100" y="140" class="quad-label">Quadrant II</text>
  <text x="100" y="410" class="quad-label">Quadrant III</text>
  <text x="380" y="410" class="quad-label">Quadrant IV</text>
  <text x="390" y="158" font-size="11" fill="#3498db">(+, +)</text>
  <text x="100" y="158" font-size="11" fill="#3498db">(−, +)</text>
  <text x="100" y="428" font-size="11" fill="#3498db">(−, −)</text>
  <text x="390" y="428" font-size="11" fill="#3498db">(+, −)</text>

  <!-- Point A(3,4) → Quadrant I -->
  <!-- x = 250 + 3*40 = 370, y = 250 - 4*40 = 90 -->
  <circle cx="370" cy="90" r="4" class="point"/>
  <text x="378" y="85" class="point-label">A(3,4)</text>

  <!-- Point B(−3,2) → Quadrant II -->
  <!-- x = 250 + (-3)*40 = 130, y = 250 - 2*40 = 170 -->
  <circle cx="130" cy="170" r="4" class="point"/>
  <text x="70" y="165" class="point-label">B(−3,2)</text>

  <!-- Point C(0,−3) → On y-axis, Quadrant III/IV boundary -->
  <!-- x = 250 + 0*40 = 250, y = 250 - (-3)*40 = 370 -->
  <circle cx="250" cy="370" r="4" class="point"/>
  <text x="228" y="390" class="point-label">C(0,−3)</text>

  <!-- Steps -->
  <text x="20" y="480" class="step">The Cartesian plane is divided into 4 quadrants by the x-axis and y-axis intersecting at the origin O(0,0).</text>
</svg>
