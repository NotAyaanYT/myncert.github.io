<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 500" width="550" height="500">
  <title>Cartesian Plane with Quadrants and Points</title>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .step { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .axis { stroke: #2c3e50; stroke-width: 2.5; }
      .grid { stroke: #ddd; stroke-width: 0.8; }
      .tick { stroke: #2c3e50; stroke-width: 1.5; }
      .point { fill: #e74c3c; }
      .point-label { fill: #e74c3c; font-weight: bold; font-family: 'Times New Roman', serif; font-size: 14px; }
      .axis-label { fill: #2c3e50; font-family: 'Times New Roman', serif; font-size: 14px; font-style: italic; }
      .quad-label { fill: #3498db; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    </style>
  </defs>

  <!-- Title -->
  <text x="275" y="25" text-anchor="middle" class="title" font-weight="bold">Cartesian Plane: Four Quadrants</text>

  <!-- Grid -->
  <g>
    <line x1="50" y1="100" x2="50" y2="450" class="grid"/>
    <line x1="125" y1="100" x2="125" y2="450" class="grid"/>
    <line x1="200" y1="100" x2="200" y2="450" class="grid"/>
    <line x1="275" y1="100" x2="275" y2="450" class="grid"/>
    <line x1="350" y1="100" x2="350" y2="450" class="grid"/>
    <line x1="425" y1="100" x2="425" y2="450" class="grid"/>
    <line x1="500" y1="100" x2="500" y2="450" class="grid"/>
    <line x1="50" y1="100" x2="500" y2="100" class="grid"/>
    <line x1="50" y1="162.5" x2="500" y2="162.5" class="grid"/>
    <line x1="50" y1="225" x2="500" y2="225" class="grid"/>
    <line x1="50" y1="287.5" x2="500" y2="287.5" class="grid"/>
    <line x1="50" y1="350" x2="500" y2="350" class="grid"/>
    <line x1="50" y1="412.5" x2="500" y2="412.5" class="grid"/>
  </g>

  <!-- Axes -->
  <!-- X-axis (horizontal) -->
  <line x1="50" y1="275" x2="500" y2="275" class="axis"/>
  <!-- Y-axis (vertical) -->
  <line x1="275" y1="100" x2="275" y2="450" class="axis"/>

  <!-- Arrow heads -->
  <polygon points="500,275 490,270 490,280" fill="#2c3e50"/>
  <polygon points="275,100 270,110 280,110" fill="#2c3e50"/>

  <!-- Tick marks -->
  <line x1="125" y1="270" x2="125" y2="280" class="tick"/>
  <line x1="200" y1="270" x2="200" y2="280" class="tick"/>
  <line x1="350" y1="270" x2="350" y2="280" class="tick"/>
  <line x1="425" y1="270" x2="425" y2="280" class="tick"/>

  <line x1="270" y1="162.5" x2="280" y2="162.5" class="tick"/>
  <line x1="270" y1="225" x2="280" y2="225" class="tick"/>
  <line x1="270" y1="350" x2="280" y2="350" class="tick"/>
  <line x1="270" y1="412.5" x2="280" y2="412.5" class="tick"/>

  <!-- Axis labels -->
  <text x="505" y="280" class="axis-label">x</text>
  <text x="278" y="95" class="axis-label">y</text>
  <text x="265" y="280" class="axis-label">O</text>

  <!-- Number labels on axes -->
  <text x="122" y="268" font-size="11" fill="#555">−3</text>
  <text x="197" y="268" font-size="11" fill="#555">−1</text>
  <text x="347" y="268" font-size="11" fill="#555">1</text>
  <text x="422" y="268" font-size="11" fill="#555">3</text>

  <text x="260" y="166" font-size="11" fill="#555">3</text>
  <text x="260" y="229" font-size="11" fill="#555">1</text>
  <text x="260" y="353" font-size="11" fill="#555">−1</text>
  <text x="260" y="416" font-size="11" fill="#555">−3</text>

  <!-- Quadrant labels -->
  <text x="380" y="140" class="quad-label">Quadrant I</text>
  <text x="100" y="140" class="quad-label">Quadrant II</text>
  <text x="100" y="410" class="quad-label">Quadrant III</text>
  <text x="380" y="410" class="quad-label">Quadrant IV</text>
  <text x="380" y="155" font-size="10" fill="#3498db">(+, +)</text>
  <text x="100" y="155" font-size="10" fill="#3498db">(−, +)</text>
  <text x="100" y="425" font-size="10" fill="#3498db">(−, −)</text>
  <text x="380" y="425" font-size="10" fill="#3498db">(+, −)</text>

  <!-- Point A(2,3) → Quadrant I -->
  <circle cx="350" cy="162.5" r="4" class="point"/>
  <text x="358" y="157" class="point-label">A(2,3)</text>

  <!-- Point B(−2,1) → Quadrant II -->
  <circle cx="200" cy="225" r="4" class="point"/>
  <text x="140" y="220" class="point-label">B(−2,1)</text>

  <!-- Point C(−1,−2) → Quadrant III -->
  <circle cx="200" cy="350" r="4" class="point"/>
  <text x="140" y="355" class="point-label">C(−1,−2)</text>

  <!-- Steps -->
  <text x="20" y="475" class="step">The Cartesian plane is divided into 4 quadrants by the x-axis and y-axis intersecting at the origin O(0,0).</text>
  <text x="20" y="490" class="step">Quadrant I: x &gt; 0, y &gt; 0 | Quadrant II: x &lt; 0, y &gt; 0 | Quadrant III: x &lt; 0, y &lt; 0 | Quadrant IV: x &gt; 0, y &lt; 0</text>
</svg>
