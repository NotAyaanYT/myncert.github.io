<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 560" width="650" height="560">
  <title>Fig 1.3 - Reiaan's Room with Coordinate Axes</title>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
      .axis { stroke: #2c3e50; stroke-width: 2.5; }
      .grid { stroke: #ddd; stroke-width: 0.8; }
      .tick { stroke: #2c3e50; stroke-width: 1.5; }
      .wall { stroke: #2c3e50; stroke-width: 3; fill: none; }
      .wall-fill { fill: #f0f8ff; stroke: none; }
      .door { stroke: #8B4513; stroke-width: 4; stroke-dasharray: 6,4; }
      .door-label { fill: #8B4513; font-family: 'Times New Roman', serif; font-size: 13px; font-style: italic; }
      .corner-label { fill: #2c3e50; font-family: 'Times New Roman', serif; font-size: 14px; font-weight: bold; }
      .point { fill: #e74c3c; }
      .coord-label { fill: #e74c3c; font-family: 'Times New Roman', serif; font-size: 11px; }
      .axis-label { fill: #2c3e50; font-family: 'Times New Roman', serif; font-size: 14px; font-style: italic; }
      .dim-label { fill: #555; font-family: Arial, sans-serif; font-size: 11px; }
      .note { fill: #888; font-family: Arial, sans-serif; font-size: 10px; font-style: italic; }
    </style>
  </defs>

  <!-- Title -->
  <text x="325" y="25" text-anchor="middle" class="title" font-weight="bold">Fig 1.3 — Reiaan's Room with Coordinate Axes</text>
  <text x="325" y="42" text-anchor="middle" class="subtitle">Room OABC with Door D₁R₁ and Bathroom Door B₁B₂</text>

  <!-- Coordinate system:
       Room spans x: 0 to 12, y: 0 to 9
       Origin O at (0,0) → pixel (80, 500)
       Scale: 35px per unit
       x-axis: 80 + n*35
       y-axis: 500 - n*35
  -->

  <!-- Room fill -->
  <rect x="80" y="185" width="420" height="315" class="wall-fill" opacity="0.3"/>

  <!-- Grid lines (unit squares) -->
  <g class="grid">
    <!-- Vertical grid: x = 0 to 12 -->
    <line x1="80" y1="185" x2="80" y2="500"/>
    <line x1="115" y1="185" x2="115" y2="500"/>
    <line x1="150" y1="185" x2="150" y2="500"/>
    <line x1="185" y1="185" x2="185" y2="500"/>
    <line x1="220" y1="185" x2="220" y2="500"/>
    <line x1="255" y1="185" x2="255" y2="500"/>
    <line x1="290" y1="185" x2="290" y2="500"/>
    <line x1="325" y1="185" x2="325" y2="500"/>
    <line x1="360" y1="185" x2="360" y2="500"/>
    <line x1="395" y1="185" x2="395" y2="500"/>
    <line x1="430" y1="185" x2="430" y2="500"/>
    <line x1="465" y1="185" x2="465" y2="500"/>
    <line x1="500" y1="185" x2="500" y2="500"/>
    <!-- Horizontal grid: y = 0 to 9 -->
    <line x1="80" y1="500" x2="500" y2="500"/>
    <line x1="80" y1="465" x2="500" y2="465"/>
    <line x1="80" y1="430" x2="500" y2="430"/>
    <line x1="80" y1="395" x2="500" y2="395"/>
    <line x1="80" y1="360" x2="500" y2="360"/>
    <line x1="80" y1="325" x2="500" y2="325"/>
    <line x1="80" y1="290" x2="500" y2="290"/>
    <line x1="80" y1="255" x2="500" y2="255"/>
    <line x1="80" y1="220" x2="500" y2="220"/>
    <line x1="80" y1="185" x2="500" y2="185"/>
  </g>

  <!-- Room walls (rectangle O-A-B-C) -->
  <!-- O→A along x-axis (bottom) -->
  <line x1="80" y1="500" x2="500" y2="500" class="wall"/>
  <!-- A→B (right wall) -->
  <line x1="500" y1="500" x2="500" y2="185" class="wall"/>
  <!-- B→C (top) -->
  <line x1="500" y1="185" x2="80" y2="185" class="wall"/>
  <!-- C→O (left wall, y-axis) -->
  <line x1="80" y1="185" x2="80" y2="500" class="wall"/>

  <!-- X-axis (along OA) -->
  <line x1="80" y1="500" x2="520" y2="500" class="axis"/>
  <!-- Y-axis (along OC) -->
  <line x1="80" y1="185" x2="80" y2="520" class="axis"/>

  <!-- Arrow heads -->
  <polygon points="520,500 508,494 508,506" fill="#2c3e50"/>
  <polygon points="80,185 74,197 86,197" fill="#2c3e50"/>

  <!-- Axis labels -->
  <text x="530" y="505" class="axis-label">x</text>
  <text x="70" y="180" class="axis-label">y</text>

  <!-- Tick marks on X-axis (y = 0 line) -->
  <line x1="115" y1="495" x2="115" y2="505" class="tick"/><text x="107" y="520" font-size="11" fill="#555">1</text>
  <line x1="150" y1="495" x2="150" y2="505" class="tick"/><text x="142" y="520" font-size="11" fill="#555">2</text>
  <line x1="185" y1="495" x2="185" y2="505" class="tick"/><text x="177" y="520" font-size="11" fill="#555">3</text>
  <line x1="220" y1="495" x2="220" y2="505" class="tick"/><text x="212" y="520" font-size="11" fill="#555">4</text>
  <line x1="255" y1="495" x2="255" y2="505" class="tick"/><text x="247" y="520" font-size="11" fill="#555">5</text>
  <line x1="290" y1="495" x2="290" y2="505" class="tick"/><text x="282" y="520" font-size="11" fill="#555">6</text>
  <line x1="325" y1="495" x2="325" y2="505" class="tick"/><text x="317" y="520" font-size="11" fill="#555">7</text>
  <line x1="360" y1="495" x2="360" y2="505" class="tick"/><text x="352" y="520" font-size="11" fill="#555">8</text>
  <line x1="395" y1="495" x2="395" y2="505" class="tick"/><text x="387" y="520" font-size="11" fill="#555">9</text>
  <line x1="430" y1="495" x2="430" y2="505" class="tick"/><text x="422" y="520" font-size="11" fill="#555">10</text>
  <line x1="465" y1="495" x2="465" y2="505" class="tick"/><text x="457" y="520" font-size="11" fill="#555">11</text>
  <line x1="500" y1="495" x2="500" y2="505" class="tick"/><text x="492" y="520" font-size="11" fill="#555">12</text>

  <!-- Tick marks on Y-axis (x = 0 line) -->
  <line x1="75" y1="465" x2="85" y2="465" class="tick"/><text x="60" y="469" font-size="11" fill="#555">1</text>
  <line x1="75" y1="430" x2="85" y2="430" class="tick"/><text x="60" y="434" font-size="11" fill="#555">2</text>
  <line x1="75" y1="395" x2="85" y2="395" class="tick"/><text x="60" y="399" font-size="11" fill="#555">3</text>
  <line x1="75" y1="360" x2="85" y2="360" class="tick"/><text x="60" y="364" font-size="11" fill="#555">4</text>
  <line x1="75" y1="325" x2="85" y2="325" class="tick"/><text x="60" y="329" font-size="11" fill="#555">5</text>
  <line x1="75" y1="290" x2="85" y2="290" class="tick"/><text x="60" y="294" font-size="11" fill="#555">6</text>
  <line x1="75" y1="255" x2="85" y2="255" class="tick"/><text x="60" y="259" font-size="11" fill="#555">7</text>
  <line x1="75" y1="220" x2="85" y2="220" class="tick"/><text x="60" y="224" font-size="11" fill="#555">8</text>
  <line x1="75" y1="185" x2="85" y2="185" class="tick"/><text x="60" y="189" font-size="11" fill="#555">9</text>

  <!-- Room corner labels -->
  <text x="70" y="515" class="corner-label">O</text>
  <text x="505" y="515" class="corner-label">A (12, 0)</text>
  <text x="505" y="178" class="corner-label">B (12, 9)</text>
  <text x="60" y="178" class="corner-label">C (0, 9)</text>

  <!-- Door D₁R₁ on the x-axis (bottom wall) -->
  <!-- D₁ = (8, 0) → px: 80+8*35=360, py: 500 -->
  <!-- R₁ = (11.5, 0) → px: 80+11.5*35=482.5, py: 500 -->
  <line x1="360" y1="500" x2="482.5" y2="500" class="door"/>
  <!-- Door arc opening indication -->
  <path d="M 360,500 Q 360,465 395,465" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="370" y="540" class="door-label">D₁</text>
  <text x="490" y="540" class="door-label">R₁</text>
  <!-- Red dots for door endpoints -->
  <circle cx="360" cy="500" r="3.5" class="point"/>
  <circle cx="482.5" cy="500" r="3.5" class="point"/>
  <!-- Door dimension annotation -->
  <text x="395" y="550" class="dim-label">Door width = 3.5 units</text>

  <!-- Bathroom door B₁B₂ on the y-axis (left wall) -->
  <!-- B₁ = (0, 1.5) → px: 80, py: 500-1.5*35=447.5 -->
  <!-- B₂ = (0, 4) → px: 80, py: 500-4*35=360 -->
  <line x1="80" y1="447.5" x2="80" y2="360" class="door"/>
  <!-- Bathroom door arc -->
  <path d="M 80,447.5 Q 115,447.5 115,412.5" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="45" y="445" class="door-label">B₁</text>
  <text x="45" y="355" class="door-label">B₂</text>
  <!-- Red dots -->
  <circle cx="80" cy="447.5" r="3.5" class="point"/>
  <circle cx="80" cy="360" r="3.5" class="point"/>
  <!-- Door dimension annotation -->
  <text x="20" y="400" class="dim-label" transform="rotate(-90, 20, 400)">Bathroom door width = 2.5 units</text>

  <!-- Wall dimension annotations -->
  <!-- Room width OA = 12 units -->
  <text x="260" y="545" class="dim-label" text-anchor="middle">Room width = 12 units</text>
  <!-- Room height OC = 9 units -->
  <text x="40" y="340" class="dim-label" text-anchor="middle" transform="rotate(-90, 40, 340)">Room height = 9 units</text>

  <!-- Step indicator -->
  <text x="325" y="560" text-anchor="middle" class="note">Scale: 1 unit = 35 px | Axes: x-axis (OA), y-axis (OC)</text>
</svg>
