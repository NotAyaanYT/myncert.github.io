<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <title>Circumcircle of an Obtuse Triangle</title>
  <defs>
    <style>
      .label { font-family: 'Times New Roman', serif; font-size: 14px; }
      .title { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
      .step { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .dot { fill: #e74c3c; }
      .line-side { stroke: #2c3e50; stroke-width: 2; }
      .line-circle { stroke: #3498db; stroke-width: 2; fill: none; }
      .line-bisector { stroke: #e67e22; stroke-width: 1.5; stroke-dasharray: 4,4; }
      .point-label { fill: #e74c3c; font-weight: bold; }
    </style>
  </defs>

  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" class="title" font-weight="bold">Circumcircle of an Obtuse Triangle (∠A = 100°)</text>

  <!-- Obtuse triangle ABC (∠A ≈ 100°) -->
  <polygon points="260,130 100,360 400,360" fill="rgba(231,76,60,0.06)" stroke="#2c3e50" stroke-width="2.5"/>

  <!-- Sides -->
  <line x1="100" y1="360" x2="400" y2="360" class="line-side"/>
  <line x1="400" y1="360" x2="260" y2="130" class="line-side"/>
  <line x1="260" y1="130" x2="100" y2="360" class="line-side"/>

  <!-- Perpendicular bisector of AB -->
  <line x1="180" y1="245" x2="280" y2="145" class="line-bisector"/>
  <!-- Perpendicular bisector of BC -->
  <line x1="250" y1="270" x2="250" y2="390" class="line-bisector"/>

  <!-- Circumcentre O (outside the triangle!) -->
  <circle cx="270" cy="180" r="4" fill="#e74c3c"/>
  <text x="278" y="175" class="point-label" font-size="15">O</text>
  <line x1="270" y1="180" x2="270" y2="175" stroke="#e74c3c" stroke-width="1"/>

  <!-- Circumcircle (large, centre outside triangle) -->
  <circle cx="270" cy="180" r="195" class="line-circle"/>

  <!-- Vertex labels -->
  <text x="85" y="375" class="point-label" font-size="16">A</text>
  <text x="408" y="375" class="point-label" font-size="16">B</text>
  <text x="250" y="118" class="point-label" font-size="16">C</text>

  <!-- Obtuse angle arc -->
  <path d="M 190,330 A 70,70 0 0,0 330,330" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="245" y="345" fill="#e74c3c" font-size="12">100°</text>

  <!-- Note about obtuse circumcentre -->
  <text x="20" y="420" class="step">Step 1: Draw obtuse triangle ABC with ∠A &gt; 90°</text>
  <text x="20" y="435" class="step">Step 2: Draw perpendicular bisectors of two sides</text>
  <text x="20" y="450" class="step">Step 3: Perpendicular bisectors intersect OUTSIDE the triangle → O outside</text>
</svg>
