<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <title>Perpendicular from Centre to a Chord</title>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
      .step { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .line-circle { stroke: #3498db; stroke-width: 2.5; fill: none; }
      .line-chord { stroke: #2c3e50; stroke-width: 2.5; }
      .line-perp { stroke: #e74c3c; stroke-width: 2; }
      .line-radius { stroke: #27ae60; stroke-width: 1.5; stroke-dasharray: 4,3; }
      .point-label { fill: #e74c3c; font-weight: bold; font-family: 'Times New Roman', serif; font-size: 15px; }
      .dim-label { fill: #8e44ad; font-size: 12px; font-style: italic; }
    </style>
  </defs>

  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" class="title" font-weight="bold">Step-by-Step: Perpendicular from Centre bisects the Chord</text>

  <!-- Circle with centre O(250,230) radius 160 -->
  <circle cx="250" cy="230" r="160" class="line-circle"/>

  <!-- Centre O -->
  <circle cx="250" cy="230" r="3.5" fill="#e74c3c"/>
  <text x="258" y="225" class="point-label">O</text>

  <!-- Chord AB (vertical at x=160) -->
  <!-- half-chord = sqrt(160² - 90²) = sqrt(17500) ≈ 132.288 -->
  <!-- A(160, 97.7), B(160, 362.3), M(160, 230) -->
  <line x1="160" y1="97.7" x2="160" y2="362.3" class="line-chord"/>
  <text x="145" y="92" class="point-label">A</text>
  <text x="145" y="380" class="point-label">B</text>

  <!-- Perpendicular OM (horizontal from centre to chord) -->
  <line x1="250" y1="230" x2="160" y2="230" class="line-perp"/>
  <text x="155" y="222" class="point-label">M</text>

  <!-- Right angle mark at M (between vertical chord and horizontal OM) -->
  <polyline points="170,230 170,220 160,220" fill="none" stroke="#e74c3c" stroke-width="1.5"/>

  <!-- Radii OA and OB (dashed) -->
  <line x1="250" y1="230" x2="160" y2="97.7" class="line-radius"/>
  <line x1="250" y1="230" x2="160" y2="362.3" class="line-radius"/>

  <!-- Radius labels -->
  <text x="205" y="145" fill="#27ae60" font-size="12" font-style="italic">R</text>
  <text x="215" y="310" fill="#27ae60" font-size="12" font-style="italic">R</text>

  <!-- Theorem statement -->
  <text x="20" y="420" class="step">Step 1: Draw chord AB in the circle with centre O.</text>
  <text x="20" y="435" class="step">Step 2: Draw perpendicular OM from centre O to chord AB. Then AM = BM.</text>

  <!-- AM = BM label -->
  <text x="165" y="280" class="dim-label">AM = BM</text>
</svg>
